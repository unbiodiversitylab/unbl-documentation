# environment.yaml
# Conda environment for UNBL documentation
# Use: conda env create -f environment.yaml
# or:  mamba env create -f environment.yaml (faster)

name: unbl-docs
channels:
  - conda-forge
  - defaults

dependencies:
  # Core Python
  - python=3.11

  # Sphinx and core documentation tools
  - sphinx>=7.2,<8.0
  - sphinx-rtd-theme>=2.0
  - sphinx-design>=0.5
  - sphinx-copybutton>=0.5
  - sphinx-intl>=2.1
  - sphinx-autobuild>=2021.3  # For live reloading during development

  # Furo test
  - furo>=2023.9.10


  # Core dependencies with updated versions
  - docutils>=0.18,<0.21
  - jinja2>=3.1,<4.0
  - babel>=2.12,<3.0
  - pygments>=2.17,<3.0
  - packaging>=23.0,<24.0
  - snowballstemmer>=2.2,<3.0
  - markupsafe>=2.1,<3.0

  # Updated Sphinx extensions
  - sphinxcontrib-applehelp>=1.0.4,<2.0
  - sphinxcontrib-devhelp>=1.0.5,<2.0
  - sphinxcontrib-htmlhelp>=2.0.4,<3.0
  - sphinxcontrib-jsmath>=1.0.1,<2.0
  - sphinxcontrib-qthelp>=1.0.6,<2.0
  - sphinxcontrib-serializinghtml>=1.1.9,<2.0

  # Additional useful extensions
  - myst-parser>=2.0,<3.0  # For Markdown support
  - sphinx-tabs>=3.4,<4.0  # For tabbed content
  - sphinx-togglebutton>=0.3,<1.0  # For collapsible content

  # Development and utility tools
  - pre-commit>=3.0,<4.0  # For code quality
  - black>=23.0,<25.0  # Code formatting
  - isort>=5.12,<6.0  # Import sorting

  # Network and utility packages
  - requests>=2.31,<3.0
  - urllib3>=2.0,<3.0
  - certifi>=2023.7
  - charset-normalizer>=3.2,<4.0
  - idna>=3.4,<4.0

  # Image processing (for handling documentation images)
  - pillow>=10.0,<11.0

  # Optional: for advanced features
  - pip>=23.0  # For any pip-only packages

  # Pip-only dependencies (packages not available via conda)
  - pip:
    - sphinx-favicon>=1.0.1  # Custom favicons
    - sphinxext-opengraph>=0.9.1  # Open Graph meta tags for social sharing
    - rstcheck>=6.2.0  # RST linting