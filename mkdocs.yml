site_name: UNBL Online Documentation
site_description: User's Guide to the UN Biodiversity Lab
site_author: UN Biodiversity Lab Team
site_url: https://undp-unbl.github.io/unbl-documentation/
copyright: Copyright &copy; 2025 UNDP & UNEP-WCMC

# Repository
repo_name: UNDP-UNBL/unbl-documentation
repo_url: https://github.com/UNDP-UNBL/unbl-documentation
edit_uri: edit/main/docs/

# Theme Configuration
theme:
  name: material
  language: en
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Lato
    code: Inconsolata
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.action.view
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  logo: # assets/images/UNBL_FULL_WEBSITE.png
  favicon: # assets/images/UNBL_FULL_WEBSITE.png

# Plugins
plugins:
  - search:
      lang:
        - en
        - es
        - fr
        - pt
        - ru
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: Español
          build: true
          site_name: Documentación en Línea de UNBL
