[rstcheck]
report_level = info
ignore_roles = 
    numref,
    doc,
    ref,
    kbd,
    guilabel,
    menuselection
ignore_directives = 
    toctree,
    figure,
    include,
    note,
    warning,
    tip,
    important,
    caution,
    attention,
    danger,
    error,
    hint,
    seealso,
    versionadded,
    versionchanged,
    deprecated,
    todo,
    code-block,
    literalinclude
ignore_substitutions = 
    version,
    release