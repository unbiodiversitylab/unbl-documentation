# .readthedocs.yaml
# Read the Docs configuration file for UNBL documentation
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

# Set the OS, Python version and other tools you might need
build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    pre_create_environment:
      # Install conda/mamba
      - asdf plugin add micromamba
      - asdf install micromamba latest
      - asdf global micromamba latest
      - micromamba --version
    post_create_environment:
      # Install dependencies with micromamba
      - micromamba env create -f environment.yaml
      - micromamba activate unbl-docs

# Build documentation in the docs/ directory with Sphinx
sphinx:
  configuration: conf.py
  fail_on_warning: false

# Optionally build your docs in additional formats such as PDF
formats:
  - pdf
  # - epub

# Optional: set the version of Python and requirements
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

# Build all language versions
search:
  ranking:
    "*": -1
    "en/*": 0

# Subprojects for translations (uncomment when ready)
